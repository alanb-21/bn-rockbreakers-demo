<section class="team">
  <div class="section-inner">
    <div style="text-align:center;margin-bottom:20px">
      <div class="section-eyebrow" style="justify-content:center;display:inline-flex">The team</div>
      <h2 class="section-title">Who you'll <em>meet</em>.</h2>
    </div>

    <div class="team-grid">
      <article class="team-card">
        <div class="team-photo">
          <img src="images/team/person1.jpg" alt="[Name]">
          <span class="team-role-badge">[Role]</span>
        </div>
        <div class="team-body">
          <h3 class="team-name">[Full Name]</h3>
          <div class="team-qual">[Qualification line · e.g. BDS, MFD]</div>
          <p class="team-bio">[2-3 sentence bio — background, focus areas, what patients/clients should know about working with them.]</p>
          <div class="team-qualifications">
            <span class="team-qual-tag">[Tag]</span>
            <span class="team-qual-tag">[Tag]</span>
            <span class="team-qual-tag">[Tag]</span>
          </div>
        </div>
      </article>
      <article class="team-card">
        <div class="team-photo">
          <img src="images/team/person2.jpg" alt="[Name]">
          <span class="team-role-badge">[Role]</span>
        </div>
        <div class="team-body">
          <h3 class="team-name">[Full Name]</h3>
          <div class="team-qual">[Qualification line]</div>
          <p class="team-bio">[Bio.]</p>
          <div class="team-qualifications">
            <span class="team-qual-tag">[Tag]</span>
            <span class="team-qual-tag">[Tag]</span>
          </div>
        </div>
      </article>
    </div>
  </div>
</section>
