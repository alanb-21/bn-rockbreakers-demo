<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Page not found — [Brand Name]</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px 20px}
  .nf-eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.36em;text-transform:uppercase;color:var(--accent);margin-bottom:24px;font-weight:500}
  .nf-code{font-family:var(--serif);font-weight:300;font-size:clamp(80px,14vw,180px);line-height:.9;letter-spacing:-.04em;color:var(--ink)}
  .nf-code em{font-style:italic;color:var(--accent)}
  .nf-title{font-family:var(--serif);font-weight:300;font-size:clamp(28px,3.6vw,42px);color:var(--ink);margin:24px 0 14px}
  .nf-sub{font-size:15px;color:var(--ink-dim);max-width:440px;margin:0 auto 36px;line-height:1.7}
  .nf-actions{display:inline-flex;gap:14px;flex-wrap:wrap;justify-content:center}
</style>
</head>
<body>
  <div>
    <div class="nf-eyebrow">Error 404</div>
    <h1 class="nf-code">Page not <em>found.</em></h1>
    <p class="nf-title">This one got away from us.</p>
    <p class="nf-sub">The page you were looking for has moved or never existed. Try the homepage or get in touch and we'll help.</p>
    <div class="nf-actions">
      <a class="btn-hero-primary" href="index.html">Back to home</a>
      <a class="btn-hero-secondary" href="contact.html">Contact us</a>
    </div>
  </div>
</body>
</html>
